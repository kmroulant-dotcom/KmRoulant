workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Apple API Key

    environment:
      xcode: latest
      cocoapods: default
      #corrige le bug "No matching profiles found for bundle identifier"
      #ios_signing:
       # distribution_type: app_store
        #bundle_identifier: com.kmroulant.KmRoulant
      vars:
        #XCODE_PROJECT: "ios/ReactKmRoulant.xcodeproj"
        XCODE_SCHEME: "ReactKmRoulant"

    scripts:
      - name: Install dependencies
        script: |
          npm ci
        #new:
      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Create Symlinks to Header Folders
        script: |
          mkdir -p $HOME/Library/Developer/Xcode/DerivedData
          ln -s $CM_BUILD_DIR/ios/ReactKmRoulant/Headers $HOME/Library/Developer/Xcode/DerivedData

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/ios/ReactKmRoulant.xcworkspace" \
            --scheme "$XCODE_SCHEME"
        #--project "$CM_BUILD_DIR/$XCODE_PROJECT" \
    outputs:
      - $HOME/Library/Developer/Xcode/DerivedData/*.h    

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
